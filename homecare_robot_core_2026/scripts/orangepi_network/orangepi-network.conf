# Orange Pi wired LAN defaults for Jetson.
#
# The USB path below matches the current Jetson USB port used by the
# Realtek RTL8153 adapter. A replacement adapter on the same port keeps
# working even when its MAC address changes.
ORANGEPI_USB_PATH=platform-3610000.usb-usb-0:2:1.0
ORANGEPI_USB_DRIVER=r8152

ORANGEPI_LAN_NAME=orangepi0
ORANGEPI_LAN_ADDR=192.168.10.1/24
ORANGEPI_LAN_CIDR=192.168.10.0/24
ORANGEPI_NM_CONNECTION=orangepi-lan

# Leave empty to use the current default-route device, normally wlP1p1s0.
ORANGEPI_WAN_IF=
